<title>Warfarin Label | รพ.เขวาสินรินทร์</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

  :root {
    --orange: #E8650A;
    --orange-l: #FFF3EB;
    --blue-drug: #2563EB;
    --blue-l: #EFF6FF;
    --pink-drug: #DB2777;
    --pink-l: #FDF2F8;
    --gray-900: #111827;
    --gray-700: #374151;
    --gray-500: #6B7280;
    --gray-300: #D1D5DB;
    --gray-100: #F3F4F6;
    --white: #FFFFFF;
    --border: #E5E7EB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #F9FAFB;
    color: var(--gray-900);
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 2px solid var(--orange);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .logo {
    width: 38px; height: 38px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 20px;
  }
  header h1 { font-size: 20px; font-weight: 700; color: var(--gray-900); }
  header span { font-size: 13px; color: var(--gray-500); }

  .container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 24px 20px;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 24px;
    align-items: start;
  }

  .card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    padding: 22px;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-700);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--orange);
    flex-shrink: 0;
  }

  label { font-size: 13px; font-weight: 600; color: var(--gray-700); display: block; margin-bottom: 5px; }
  input, select, textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    color: var(--gray-900);
    background: var(--white);
    transition: border .15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--orange); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 14px; }

  /* Drug row */
  .drug-rows { display: flex; flex-direction: column; gap: 10px; }
  .drug-row {
    background: var(--gray-100);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    border-left: 4px solid var(--gray-300);
    transition: border-color .15s;
  }
  .drug-row.color-orange { border-left-color: #F97316; background: #FFF7ED; }
  .drug-row.color-blue   { border-left-color: #3B82F6; background: #EFF6FF; }
  .drug-row.color-pink   { border-left-color: #EC4899; background: #FDF4FF; }

  .drug-row-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .color-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }
  .badge-orange { background: #FED7AA; color: #9A3412; }
  .badge-blue   { background: #BFDBFE; color: #1E40AF; }
  .badge-pink   { background: #FBCFE8; color: #9D174D; }

  .remove-btn {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-500);
    font-size: 18px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background .15s;
  }
  .remove-btn:hover { background: #FEE2E2; color: #DC2626; }

  /* Days grid */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 6px;
  }
  .day-check {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-700);
  }
  .day-check input[type=checkbox] {
    width: 20px; height: 20px;
    accent-color: var(--orange);
    cursor: pointer;
  }

  .add-drug-btn {
    width: 100%;
    padding: 10px;
    background: var(--orange-l);
    border: 2px dashed #FDBA74;
    border-radius: 10px;
    color: var(--orange);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    transition: background .15s;
    margin-top: 8px;
  }
  .add-drug-btn:hover { background: #FED7AA; }

  /* Summary */
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 8px;
  }
  .summary-table th {
    text-align: left;
    padding: 7px 10px;
    background: var(--gray-100);
    font-size: 12px;
    color: var(--gray-500);
    border-bottom: 1px solid var(--border);
  }
  .summary-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
  }
  .pill-count {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-weight: 700;
    font-size: 16px;
  }

  /* Print button */
  .print-btn {
    width: 100%;
    padding: 13px;
    background: var(--orange);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Sarabun', sans-serif;
    cursor: pointer;
    transition: background .15s;
    margin-bottom: 12px;
  }
  .print-btn:hover { background: #C2510A; }

  /* ===== STICKER PREVIEW ===== */
  .sticker-panel { position: sticky; top: 20px; }

  .sticker-preview {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .sticker-preview-header {
    background: var(--gray-100);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--gray-500);
    display: flex; align-items: center; gap: 6px;
  }

  /* The actual sticker — simulate thermal */
  #stickerContent {
    padding: 16px;
    background: white;
  }

  /* ===== PRINT AREA ===== */
  #printArea {
    display: none;
  }

  @media print {
    body > * { display: none !important; }
    #printArea { display: block !important; }
  }

  /* === TYPE A: หัวรพ 1cm บน → เนื้อหา 90×60mm === */
  @media print {
    body.print-real.type-A @page { margin: 0; size: 90mm 70mm landscape; }
    body.print-real.type-A #stickerPrint {
      width: 90mm; height: 60mm;
      margin-top: 10mm;
      overflow: hidden; padding: 1.5mm 2mm; box-sizing: border-box;
    }

    body.print-a4test.type-A @page { margin: 0; size: A4 portrait; }
    body.print-a4test.type-A #printArea { display: block !important; padding: 0; margin: 0; }
    body.print-a4test.type-A #stickerPrint {
      width: 90mm !important; height: 60mm !important;
      margin-top: 10mm;
      overflow: hidden; border: 1px dashed #999 !important;
      box-sizing: border-box; padding: 2mm 2.5mm;
    }
    body.print-a4test.type-A #typeA-bar {
      display: block !important;
      width: 90mm; height: 10mm;
      border: 1px dashed #bbb;
      box-sizing: border-box;
      line-height: 10mm;
      text-align: center;
      font-size: 8pt;
      color: #999;
      font-family: sans-serif;
    }
  }

  /* === TYPE B: หัวรพ 1cm บน + รูป 2cm ล่าง → เนื้อหา 90×40mm === */
  @media print {
    body.print-real.type-B @page { margin: 0; size: 90mm 70mm landscape; }
    body.print-real.type-B #stickerPrint {
      width: 90mm; height: 40mm;
      margin-top: 10mm;
      overflow: hidden; padding: 1mm 1.5mm; box-sizing: border-box;
      font-size: 7.5pt;
    }
    body.print-real.type-B .sticker-inr { padding: 1px 4px !important; margin-bottom: 1px !important; }
    body.print-real.type-B .sticker-inr .inr-value { font-size: 11pt !important; }
    body.print-real.type-B .sticker-section-title { margin: 1px 0 0 !important; font-size: 5pt !important; }
    body.print-real.type-B .sticker-patient { margin-bottom: 1px !important; padding-bottom: 1px !important; }
    body.print-real.type-B .instr-line { font-size: 6pt !important; margin-bottom: 0 !important; line-height: 1.2 !important; white-space: normal !important; }
    body.print-real.type-B .drug-chart th { padding: 1px 0 !important; font-size: 6pt !important; }
    body.print-real.type-B .drug-chart td { padding: 0 !important; }
    body.print-real.type-B .sticker-appt { padding: 1px 3px !important; font-size: 6pt !important; margin-top: 1px !important; }
    body.print-real.type-B .sticker-footer { display: none !important; }

    body.print-a4test.type-B @page { margin: 0; size: A4 portrait; }
    body.print-a4test.type-B #printArea { display: block !important; padding: 0; margin: 0; }
    body.print-a4test.type-B #stickerPrint {
      width: 90mm !important; height: 40mm !important;
      margin-top: 10mm;
      overflow: hidden; border: 1px dashed #999 !important;
      box-sizing: border-box; padding: 1mm 1.5mm; font-size: 7.5pt;
    }
    body.print-a4test.type-B .sticker-inr { padding: 1px 4px !important; margin-bottom: 1px !important; }
    body.print-a4test.type-B .sticker-inr .inr-value { font-size: 11pt !important; }
    body.print-a4test.type-B .sticker-section-title { margin: 1px 0 0 !important; font-size: 5pt !important; }
    body.print-a4test.type-B .sticker-patient { margin-bottom: 1px !important; padding-bottom: 1px !important; }
    body.print-a4test.type-B .instr-line { font-size: 6pt !important; margin-bottom: 0 !important; line-height: 1.2 !important; white-space: normal !important; }
    body.print-a4test.type-B .drug-chart th { padding: 1px 0 !important; font-size: 6pt !important; }
    body.print-a4test.type-B .drug-chart td { padding: 0 !important; }
    body.print-a4test.type-B .sticker-appt { padding: 1px 3px !important; font-size: 6pt !important; margin-top: 1px !important; }
    body.print-a4test.type-B .sticker-footer { display: none !important; }
    body.print-a4test.type-B #typeA-bar {
      display: block !important;
      width: 90mm; height: 10mm;
      border: 1px dashed #bbb;
      box-sizing: border-box;
      line-height: 10mm;
      text-align: center;
      font-size: 8pt;
      color: #999;
      font-family: sans-serif;
    }
    body.print-a4test.type-B #typeB-bar {
      display: block !important;
      width: 90mm; height: 20mm;
      border: 1px dashed #bbb;
      box-sizing: border-box;
      line-height: 20mm;
      text-align: center;
      font-size: 8pt;
      color: #999;
      font-family: sans-serif;
    }
  }

  /* ── STICKER BASE ── */
  .sticker {
    width: 100%;
    font-family: 'Sarabun', sans-serif;
    color: #000;
    font-size: 9pt;
    line-height: 1.3;
    background: #fff;
  }

  /* HEADER: single compact line */
  .sticker-hosp { display: none; }
  .sticker-hosp span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 6.5pt; color: #333; }

  /* PATIENT */
  .sticker-patient {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 1px 5px;
    font-size: 8pt;
    margin-bottom: 2px;
    padding-bottom: 2px;
    border-bottom: 1px dashed #aaa;
  }
  .sticker-patient .lbl { color: #666; white-space: nowrap; }
  .sticker-patient .val { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* INR box */
  .sticker-inr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f0f0f0;
    padding: 1px 4px;
    border-radius: 3px;
    margin-bottom: 2px;
    border: 0.5px solid #ccc;
  }
  .sticker-inr .inr-label { font-size: 7pt; color: #555; }
  .sticker-inr .inr-value { font-size: 16pt; font-weight: 900; line-height: 1; }
  .sticker-inr .dose-week { font-size: 7pt; text-align: right; color: #333; line-height: 1.3; }

  /* Section titles */
  .sticker-section-title {
    font-size: 6.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .03em;
    color: #444;
    margin: 2px 0 1px;
    border-left: 1.5px solid #000;
    padding-left: 2px;
  }

  /* Instruction text */
  .instr-line {
    font-size: 7.5pt;
    margin-bottom: 2px;
    line-height: 1.3;
    word-break: keep-all;
    white-space: nowrap;
  }

  /* Drug chart */
  .drug-chart {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 3px;
    table-layout: fixed;
  }
  .drug-chart th {
    background: #222;
    color: #fff;
    padding: 2px 1px;
    text-align: center;
    font-size: 7.5pt;
    width: calc(100% / 7);
    font-weight: 600;
  }
  .drug-chart td {
    border: 0.5px solid #bbb;
    padding: 2px 1px;
    text-align: center;
    vertical-align: middle;
  }
  .drug-chart td.empty { background: #f8f8f8; }

  .pill-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .pill-svg { display: inline-block; vertical-align: middle; }

  .pill-dose-text { font-size: 7pt; line-height: 1.1; color: #333; }
  .color-label-o  { color: #9A3412; font-weight: 700; font-size: 7pt; }
  .color-label-b  { color: #1E40AF; font-weight: 700; font-size: 7pt; }
  .color-label-p  { color: #9D174D; font-weight: 700; font-size: 7pt; }

  /* Pill summary boxes */
  .pill-summary {
    display: flex;
    flex-direction: row;
    gap: 2px;
    margin-bottom: 2px;
  }
  .pill-summary .pill-box {
    flex: 1;
  }
  .pill-box {
    border: 1px solid #000;
    border-radius: 2px;
    padding: 1px;
    text-align: center;
  }
  .pill-box .pill-mg        { font-size: 8pt; font-weight: 900; line-height: 1.2; }
  .pill-box .pill-color     { font-size: 7pt; color: #555; }
  .pill-box .pill-count-val { font-size: 13pt; font-weight: 900; line-height: 1; }
  .pill-box .pill-unit      { font-size: 7pt; color: #555; }

  /* Appt bar */
  .sticker-appt {
    background: #000;
    color: #fff;
    text-align: center;
    padding: 1.5px 3px;
    border-radius: 2px;
    font-size: 7.5pt;
    margin-top: 2px;
    font-weight: 700;
  }

  .sticker-footer {
    text-align: center;
    font-size: 6.5pt;
    color: #aaa;
    border-top: 0.5px dotted #ccc;
    padding-top: 1px;
    margin-top: 2px;
  }

  #printArea .sticker {
    width: 100%;
    box-sizing: border-box;
  }

  /* Landscape sticker: 2-column layout */
  #printArea .sticker-body {
    display: grid;
    grid-template-columns: 32mm 1fr;
    gap: 2.5mm;
    width: 100%;
  }
  #printArea .sticker-left {}
  #printArea .sticker-right {}

  /* Preview sticker landscape simulation */
  #stickerPreview .sticker {
    width: 100%;
  }
  #stickerPreview .sticker-body {
    display: grid;
    grid-template-columns: 34% 1fr;
    gap: 8px;
  }

  /* Compact pill summary for type B */
  .pill-summary-compact {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-bottom: 2px;
  }
  .pill-compact-item {
    display: flex;
    align-items: baseline;
    gap: 4px;
    font-size: 8pt;
    line-height: 1.4;
  }
  .pill-compact-count {
    font-weight: 900;
    font-size: 10pt;
    color: #000;
  }

  /* Type B tight layout (40mm content height) */
  body.type-b-preview .sticker { font-size: 7.5pt !important; }
  body.type-b-preview .sticker-inr { padding: 1px 4px !important; margin-bottom: 1px !important; }
  body.type-b-preview .sticker-inr .inr-value { font-size: 11pt !important; }
  body.type-b-preview .sticker-inr .dose-week { font-size: 5.5pt !important; }
  body.type-b-preview .sticker-section-title { margin: 1px 0 0 !important; font-size: 5pt !important; }
  body.type-b-preview .sticker-patient { margin-bottom: 1px !important; padding-bottom: 1px !important; }
  body.type-b-preview .instr-line { font-size: 6pt !important; margin-bottom: 0 !important; line-height: 1.2 !important; white-space: normal !important; }
  body.type-b-preview .drug-chart th { padding: 1px 0 !important; font-size: 6pt !important; }
  body.type-b-preview .drug-chart td { padding: 0 !important; }
  body.type-b-preview .sticker-appt { padding: 1px 3px !important; font-size: 6pt !important; margin-top: 1px !important; }
  body.type-b-preview .sticker-footer { display: none !important; }

  /* Responsive */
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .sticker-panel { position: static; }
  }
</style>
<script>
// ── INLINE PWA MANIFEST ──
(function() {
  var manifest = {
    name: 'Warfarin Label — รพ.เขวาสินรินทร์',
    short_name: 'Warfarin',
    description: 'ระบบสติกเกอร์ยา Warfarin',
    start_url: '.',
    display: 'standalone',
    background_color: '#F9FAFB',
    theme_color: '#E8650A',

<script>
// ============ CONFIG ============
var DRUG_COLORS = [
  { id: 'orange', label: '2 mg ส้ม', mg: 2,   badge: 'badge-orange', cls: 'color-orange', pillCls: 'orange', colorText: 'ส้ม' },
  { id: 'blue',   label: '3 mg ฟ้า', mg: 3,   badge: 'badge-blue',   cls: 'color-blue',   pillCls: 'blue',   colorText: 'ฟ้า' },
  { id: 'pink',   label: '5 mg ชมพู', mg: 5,  badge: 'badge-pink',   cls: 'color-pink',   pillCls: 'pink',   colorText: 'ชมพู' }
];
var DOSES = [
  { val: '0.25', label: '¼ เม็ด' },
  { val: '0.5',  label: '½ เม็ด' },
  { val: '1',    label: '1 เม็ด' },
  { val: '1.5',  label: '1½ เม็ด' },
  { val: '2',    label: '2 เม็ด' },
  { val: '3',    label: '3 เม็ด' }
];
var DAYS = ['จ','อ','พ','พฤ','ศ','ส','อา'];
var DAY_FULL = ['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
var rowCount = 0;

// ============ DATE HELPERS ============
function getPrintDate() {
  return document.getElementById('printDate').value; // yyyy-mm-dd
}
function daysBetween(from, to) {
  var a = new Date(from), b = new Date(to);
  return Math.round((b - a) / 86400000);
}
function addDays(dateStr, days) {
  var d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  var pad = function(n){ return n<10?'0'+n:''+n; };
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function thaiDayName(dateStr) {
  var days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  var parts = dateStr.split('-');
  return days[new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2])).getDay()];
}

function onApptDaysChange() {
  var days = parseInt(document.getElementById('apptDays').value);
  var printDate = getPrintDate();
  if(days > 0 && printDate) {
    var apptDate = addDays(printDate, days);
    document.getElementById('apptDate').value = apptDate;
    showApptResult(days, apptDate);
  } else {
    document.getElementById('apptDate').value = '';
    document.getElementById('apptResult').textContent = '';
  }
  updatePreview();
}

function onApptDateChange() {
  var apptDate = document.getElementById('apptDate').value;
  var printDate = getPrintDate();
  if(apptDate && printDate) {
    var days = daysBetween(printDate, apptDate);
    if(days > 0) {
      document.getElementById('apptDays').value = days;
      showApptResult(days, apptDate);
    } else {
      document.getElementById('apptResult').textContent = '⚠️ วันนัดต้องหลังวันที่พิมพ์';
      document.getElementById('apptDays').value = '';
    }
  }
  updatePreview();
}

function onPrintDateChange() {
  // recalc apptDate from days if days exists, else recalc days from apptDate
  var days = parseInt(document.getElementById('apptDays').value);
  var apptDate = document.getElementById('apptDate').value;
  var printDate = getPrintDate();
  if(!printDate) { updatePreview(); return; }
  if(days > 0) {
    var newAppt = addDays(printDate, days);
    document.getElementById('apptDate').value = newAppt;
    showApptResult(days, newAppt);
  } else if(apptDate) {
    var d = daysBetween(printDate, apptDate);
    if(d > 0) {
      document.getElementById('apptDays').value = d;
      showApptResult(d, apptDate);
    }
  }
  updatePreview();
}

function showApptResult(days, apptDate) {
  document.getElementById('apptResult').textContent =
    'นัด ' + formatDateTH(apptDate) + ' (วัน' + thaiDayName(apptDate) + ') — ' + days + ' วัน';
}

// ============ SET TODAY ============
(function() {
  var d = new Date();
  var pad = function(n){ return n < 10 ? '0'+n : ''+n; };
  document.getElementById('printDate').value = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  addDrugRow();
  updatePreview();
})();

// ============ ADD DRUG ROW ============
function addDrugRow() {
  rowCount++;
  var id = 'row_'+rowCount;
  var div = document.createElement('div');
  div.className = 'drug-row';
  div.id = id;
  div.innerHTML =
    '<div class="drug-row-header">' +
      '<span class="color-badge badge-orange" id="badge_'+id+'">2 mg ส้ม</span>' +
      '<select onchange="onColorChange(\''+id+'\')" id="colorSel_'+id+'" style="max-width:130px">' +
        DRUG_COLORS.map(function(c){ return '<option value="'+c.id+'">'+c.label+'</option>'; }).join('') +
      '</select>' +
      '<select id="doseSel_'+id+'" onchange="updatePreview()" style="max-width:110px">' +
        DOSES.map(function(d){ return '<option value="'+d.val+'">'+d.label+'</option>'; }).join('') +
      '</select>' +
      '<button class="remove-btn" onclick="removeDrugRow(\''+id+'\')">✕</button>' +
    '</div>' +
    '<div style="font-size:12px;color:#555;margin-bottom:4px;font-weight:600;">เลือกวันที่กิน:</div>' +
    '<div class="days-grid">' +
      DAYS.map(function(d,i){
        return '<label class="day-check"><input type="checkbox" onchange="updatePreview()" id="day_'+id+'_'+i+'"> '+d+'</label>';
      }).join('') +
    '</div>';
  document.getElementById('drugRows').appendChild(div);
  onColorChange(id);
}

function removeDrugRow(id) {
  var el = document.getElementById(id);
  if(el) el.remove();
  updatePreview();
}

function onColorChange(id) {
  var sel = document.getElementById('colorSel_'+id);
  var val = sel.value;
  var cfg = DRUG_COLORS.find(function(c){ return c.id === val; });
  var row = document.getElementById(id);
  row.className = 'drug-row '+cfg.cls;
  var badge = document.getElementById('badge_'+id);
  badge.className = 'color-badge '+cfg.badge;
  badge.textContent = cfg.label;
  updatePreview();
}

// ============ COLLECT DATA ============
function collectData() {
  var rows = document.querySelectorAll('.drug-row');
  var drugs = [];
  rows.forEach(function(row) {
    var id = row.id;
    var colorSel = document.getElementById('colorSel_'+id);
    var doseSel  = document.getElementById('doseSel_'+id);
    if(!colorSel) return;
    var color = colorSel.value;
    var dose  = parseFloat(doseSel.value);
    var days  = [];
    for(var i=0;i<7;i++){
      var cb = document.getElementById('day_'+id+'_'+i);
      if(cb && cb.checked) days.push(i);
    }
    if(days.length > 0) {
      drugs.push({ color: color, dose: dose, days: days });
    }
  });
  return drugs;
}

// ============ ROUND TO 0 or 5 ============
function roundTo5(n) {
  return Math.ceil(n / 5) * 5;
}

// ============ CALCULATE ============
function calculate(drugs) {
  var apptDays = parseFloat(document.getElementById('apptDays').value) || 0;
  var weeks = apptDays > 0 ? apptDays / 7 : 0;

  var totalMgWeek = 0;
  var pillsPerWeek = { orange: 0, blue: 0, pink: 0 };
  var pillsTotal   = { orange: 0, blue: 0, pink: 0 };
  var mgMap = { orange: 2, blue: 3, pink: 5 };

  drugs.forEach(function(d) {
    var mgPerDay = d.dose * mgMap[d.color];
    totalMgWeek += mgPerDay * d.days.length;          // mg/week
    pillsPerWeek[d.color] += d.dose * d.days.length;  // เม็ด/week
  });

  // จำนวนยาที่ต้องให้ = weeks × เม็ด/week → ปัดขึ้นหน่วย 5
  var rounded = {};
  ['orange','blue','pink'].forEach(function(c){
    pillsTotal[c] = weeks * pillsPerWeek[c];
    rounded[c] = pillsTotal[c] > 0 ? roundTo5(pillsTotal[c]) : 0;
  });

  return {
    totalMgWeek: totalMgWeek,
    pillsPerWeek: pillsPerWeek,
    pillsTotal: pillsTotal,
    rounded: rounded,
    weeks: weeks
  };
}

// ============ FORMAT DATE TH ============
function formatDateTH(dateStr) {
  if(!dateStr) return '';
  var parts = dateStr.split('-');
  var year = parseInt(parts[0]), month = parseInt(parts[1])-1, day = parseInt(parts[2]);
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return day+' '+months[month]+' '+(year+543);
}

function formatDose(v) {
  if(v === 0.25) return '¼';
  if(v === 0.5)  return '½';
  if(v === 1.5)  return '1½';
  return v+'';
}

// ============ PILL SVG HELPER ============
// fraction: 1 = full, 0.5 = half, 0.25 = quarter, 0.75 = three-quarter
function pillSVG(colorId, fraction) {
  var R = 7; // radius for 90x70mm landscape
  var S = R * 2 + 2; // viewBox size
  var cx = R + 1, cy = R + 1;
  var fills = { orange: '#FED7AA', blue: '#BFDBFE', pink: '#FBCFE8' };
  var strokes = { orange: '#C2410C', blue: '#1D4ED8', pink: '#BE185D' };
  var fill   = fills[colorId]   || '#ddd';
  var stroke = strokes[colorId] || '#555';

  var svg = '<svg class="pill-svg" width="'+S+'" height="'+S+'" viewBox="0 0 '+S+' '+S+'" xmlns="http://www.w3.org/2000/svg">';

  if(fraction >= 1) {
    // Full circle with score line across middle
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5"/>';
    svg += '<line x1="'+(cx-R*0.7)+'" y1="'+cy+'" x2="'+(cx+R*0.7)+'" y2="'+cy+'" stroke="'+stroke+'" stroke-width="1" stroke-dasharray="2,1"/>';
  } else {
    // Draw background empty circle first
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="#f0f0f0" stroke="'+stroke+'" stroke-width="1.5" stroke-dasharray="3,2"/>';
    // Then draw filled sector for the fraction
    // 0 deg = top, going clockwise
    // We start from -90deg (top) = angle 0
    var startAngle = -Math.PI / 2;
    var endAngle   = startAngle + (2 * Math.PI * fraction);
    var x1 = cx + R * Math.cos(startAngle);
    var y1 = cy + R * Math.sin(startAngle);
    var x2 = cx + R * Math.cos(endAngle);
    var y2 = cy + R * Math.sin(endAngle);
    var largeArc = fraction > 0.5 ? 1 : 0;
    svg += '<path d="M '+cx+' '+cy+' L '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+R+' '+R+' 0 '+largeArc+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+fill+'" stroke="'+stroke+'" stroke-width="1.5"/>';
    // Score lines to show fraction
    if(fraction === 0.5) {
      svg += '<line x1="'+cx+'" y1="'+(cy-R)+'" x2="'+cx+'" y2="'+(cy+R)+'" stroke="'+stroke+'" stroke-width="1.2"/>';
    } else if(fraction === 0.25) {
      svg += '<line x1="'+cx+'" y1="'+(cy-R)+'" x2="'+cx+'" y2="'+(cy+R)+'" stroke="'+stroke+'" stroke-width="1"/>';
      svg += '<line x1="'+(cx-R)+'" y1="'+cy+'" x2="'+(cx+R)+'" y2="'+cy+'" stroke="'+stroke+'" stroke-width="1"/>';
    }
  }
  svg += '</svg>';
  return svg;
}

// ============ BUILD STICKER HTML ============
function buildStickerHTML(forPrint) {
  var name    = document.getElementById('patientName').value.trim() || '-';
  var hn      = document.getElementById('hn').value.trim() || '-';
  var inr     = document.getElementById('inrValue').value || '-';
  var appt    = document.getElementById('apptDays').value || '-';
  var dateStr = document.getElementById('printDate').value;
  var dateTH  = formatDateTH(dateStr);

  var drugs = collectData();
  var calc  = drugs.length ? calculate(drugs) : null;

  // Appt date - prefer #apptDate value (set by either picker or days input)
  var apptDateVal = document.getElementById('apptDate').value;
  var apptDateTH = apptDateVal ? formatDateTH(apptDateVal) : '';
  var apptDayName = apptDateVal ? thaiDayName(apptDateVal) : '';

  // --- Build drug chart (7 columns) ---
  var chartCells = [[], [], [], [], [], [], []]; // indexed by day 0=Mon...6=Sun
  drugs.forEach(function(d) {
    var cfg = DRUG_COLORS.find(function(c){ return c.id === d.color; });
    d.days.forEach(function(dayIdx) {
      chartCells[dayIdx].push({ cfg: cfg, dose: d.dose });
    });
  });

  var chartHTML = '<table class="drug-chart"><thead><tr>';
  DAYS.forEach(function(d){ chartHTML += '<th>'+d+'</th>'; });
  chartHTML += '</tr></thead><tbody><tr>';
  for(var i=0;i<7;i++) {
    var cells = chartCells[i];
    if(cells.length === 0) {
      chartHTML += '<td class="empty"></td>';
    } else {
      chartHTML += '<td><div class="pill-cell">';
      cells.forEach(function(item) {
        var colorText = '';
        if(item.cfg.id==='orange') colorText = '<span class="color-label-o">ส้ม</span>';
        else if(item.cfg.id==='blue') colorText = '<span class="color-label-b">ฟ้า</span>';
        else colorText = '<span class="color-label-p">ชมพู</span>';
        var doseText = formatDose(item.dose);
        chartHTML += '<div>';
        // draw SVG round pills
        var fullPills = Math.floor(item.dose);
        var frac = Math.round((item.dose % 1) * 4) / 4;
        for(var p=0;p<fullPills;p++) {
          chartHTML += pillSVG(item.cfg.id, 1);
        }
        if(frac > 0) {
          chartHTML += pillSVG(item.cfg.id, frac);
        }
        chartHTML += '<br>'+colorText+'<span class="pill-dose-text"> '+doseText+'</span></div>';
      });
      chartHTML += '</div></td>';
    }
  }
  chartHTML += '</tr></tbody></table>';

  // --- Pill summary boxes ---
  var summaryHTML = '';
  if(calc) {
    var hasPill = false;
    DRUG_COLORS.forEach(function(cfg) {
      if(calc.rounded[cfg.id] > 0) hasPill = true;
    });
    if(hasPill) {
      if(currentType === 'B') {
        // Compact inline: "2mg(ส้ม) 5เม็ด  |  3mg(ฟ้า) 10เม็ด"
        summaryHTML = '<div class="pill-summary-compact">';
        DRUG_COLORS.forEach(function(cfg) {
          var val = calc.rounded[cfg.id];
          if(val <= 0) return;
          var colorCls = cfg.id==='orange'?'color-label-o':cfg.id==='blue'?'color-label-b':'color-label-p';
          summaryHTML +=
            '<div class="pill-compact-item">' +
              '<span class="'+colorCls+'">'+cfg.mg+'mg('+cfg.colorText+')</span>' +
              '<span class="pill-compact-count">'+val+' เม็ด</span>' +
            '</div>';
        });
        summaryHTML += '</div>';
      } else {
        // Normal box layout
        summaryHTML = '<div class="pill-summary">';
        DRUG_COLORS.forEach(function(cfg) {
          var val = calc.rounded[cfg.id];
          if(val <= 0) return;
          summaryHTML +=
            '<div class="pill-box">' +
              '<div class="pill-color">'+cfg.colorText+'</div>' +
              '<div class="pill-mg">'+cfg.mg+' mg</div>' +
              '<div class="pill-count-val">'+val+'</div>' +
              '<div class="pill-unit">เม็ด</div>' +
            '</div>';
        });
        summaryHTML += '</div>';
      }
    }
  }

  // --- INR + dose/week ---
  var inrHTML =
    '<div class="sticker-inr">' +
      '<div><div class="inr-label">INR</div><div class="inr-value">'+inr+'</div></div>' +
      (calc ?
        '<div class="dose-week"><div style="font-size:10px;color:#555">ขนาดยา/สัปดาห์</div>' +
        '<div style="font-size:20px;font-weight:900">'+calc.totalMgWeek.toFixed(1)+'</div>' +
        '<div style="font-size:10px;color:#555">mg/week</div></div>' : '') +
    '</div>';

  // --- Instruction lines ---
  var instrLines = '';
  drugs.forEach(function(d) {
    var cfg = DRUG_COLORS.find(function(c){ return c.id === d.color; });
    // Smart day label: consecutive → "จันทร์ ถึง ศุกร์", non-consecutive → "จ พ ศ"
    var daysLabel = (function(days) {
      if(days.length === 0) return '';
      if(days.length === 1) return DAY_FULL[days[0]];
      // Check if all consecutive
      var isConsec = true;
      for(var i=1; i<days.length; i++) {
        if(days[i] !== days[i-1] + 1) { isConsec = false; break; }
      }
      if(isConsec) {
        return DAY_FULL[days[0]] + ' ถึง ' + DAY_FULL[days[days.length-1]];
      }
      // Not consecutive — check sub-groups
      // Find runs of consecutive days
      var runs = [];
      var runStart = days[0], runEnd = days[0];
      for(var j=1; j<days.length; j++) {
        if(days[j] === runEnd + 1) {
          runEnd = days[j];
        } else {
          runs.push([runStart, runEnd]);
          runStart = runEnd = days[j];
        }
      }
      runs.push([runStart, runEnd]);
      // Build label from runs
      return runs.map(function(r) {
        if(r[0] === r[1]) return DAYS[r[0]]; // single day → short
        return DAY_FULL[r[0]] + ' ถึง ' + DAY_FULL[r[1]]; // 2+ consecutive → "x ถึง y"
      }).join(', ');
    })(d.days);
    var colorLabel = '';
    if(cfg.id==='orange') colorLabel = '<span class="color-label-o">ส้ม('+cfg.mg+'mg)</span>';
    else if(cfg.id==='blue') colorLabel = '<span class="color-label-b">ฟ้า('+cfg.mg+'mg)</span>';
    else colorLabel = '<span class="color-label-p">ชมพู('+cfg.mg+'mg)</span>';
    instrLines += '<div class="instr-line">'+colorLabel+' '+formatDose(d.dose)+' เม็ด — '+daysLabel+'</div>';
  });

  var apptDaysVal = document.getElementById('apptDays').value || '?';

  var html =
    '<div class="sticker">' +

      // ── 2-COLUMN BODY (no hospital header — pre-printed on sticker) ──
      '<div class="sticker-body">' +

        // LEFT COL
        '<div class="sticker-left">' +
          '<div class="sticker-patient">' +
            '<span class="lbl">ชื่อ-สกุล</span><span class="val">'+name+'</span>' +
            '<span class="lbl">HN</span><span class="val">'+hn+'</span>' +
            '<span class="lbl">พิมพ์</span><span class="val">'+dateTH+'</span>' +
          '</div>' +

          inrHTML +

          (instrLines ?
            '<div class="sticker-section-title">วิธีรับประทานยา</div>' +
            '<div style="margin-bottom:4px;">'+instrLines+'</div>'
          : '') +
        '</div>' +

        // RIGHT COL
        '<div class="sticker-right">' +
          (drugs.length ?
            '<div class="sticker-section-title">แผนการรับประทานยา</div>' +
            chartHTML : '') +

          (summaryHTML && calc ?
            '<div class="sticker-section-title">จำนวนยาที่จ่าย ('+apptDaysVal+'วัน ÷7= '+calc.weeks.toFixed(2)+'wk)</div>' +
            summaryHTML : '') +

          '<div class="sticker-appt">📅 นัด ' + (apptDateTH ? apptDateTH+' (วัน'+apptDayName+')' : '-') + '</div>' +
        '</div>' +

      '</div>' + // end sticker-body

      '<div class="sticker-footer">พิมพ์: '+dateTH+' | Warfarin Label System รพ.เขวาสินรินทร์</div>' +
    '</div>';

  return html;
}

// ============ UPDATE PREVIEW + SUMMARY ============
function updatePreview() {
  var html = buildStickerHTML(false);
  document.getElementById('stickerPreview').innerHTML = html;
  // apply type-B tight preview class
  if(currentType === 'B') document.body.classList.add('type-b-preview');
  else document.body.classList.remove('type-b-preview');

  // Calc summary
  var drugs = collectData();
  if(!drugs.length) {
    document.getElementById('calcSummary').innerHTML =
      '<p style="color:var(--gray-500);font-size:13px;">กรอกข้อมูลยาเพื่อดูสรุป</p>';
    return;
  }
  var calc = calculate(drugs);
  var apptDays = document.getElementById('apptDays').value;
  var html2 = '';
  if(!apptDays || parseFloat(apptDays) <= 0) {
    html2 += '<div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:6px;padding:8px 10px;font-size:12px;color:#92400E;margin-bottom:8px;">⚠️ กรุณาระบุจำนวนวันนัด หรือเลือกวันนัด เพื่อคำนวณจำนวนยา</div>';
  } else {
    html2 += '<div style="font-size:12px;color:var(--gray-500);margin-bottom:8px;">'+
      'นัด <strong>'+apptDays+' วัน</strong> = <strong>'+calc.weeks.toFixed(4)+' สัปดาห์</strong></div>';
  }
  html2 += '<table class="summary-table">' +
    '<thead><tr><th>สี / ขนาด</th><th>เม็ด/สัปดาห์</th><th>ต้องให้ (คำนวณ)</th><th>จ่าย (ปัด×5)</th></tr></thead><tbody>';

  DRUG_COLORS.forEach(function(cfg) {
    var perWeek = calc.pillsPerWeek[cfg.id];
    if(perWeek <= 0) return;
    var exact   = calc.pillsTotal[cfg.id];
    var rounded = calc.rounded[cfg.id];
    html2 += '<tr>' +
      '<td><span class="color-badge '+cfg.badge+'">'+cfg.label+'</span></td>' +
      '<td>'+perWeek.toFixed(2)+'</td>' +
      '<td style="color:var(--gray-500)">'+exact.toFixed(2)+'</td>' +
      '<td><span class="pill-count">'+rounded+' <small style="color:var(--gray-500);font-weight:400">เม็ด</small></span></td>' +
    '</tr>';
  });

  html2 += '<tr style="background:var(--orange-l)">' +
    '<td><strong>รวม mg/week</strong></td>' +
    '<td colspan="3"><strong>'+calc.totalMgWeek.toFixed(2)+' mg/week</strong></td>' +
  '</tr>';
  html2 += '</tbody></table>';
  document.getElementById('calcSummary').innerHTML = html2;
}

// ============ STICKER TYPE ============
var currentType = 'A';
function setStickerType(t) {
  currentType = t;
  // update UI
  var a = document.getElementById('typeA');
  var b = document.getElementById('typeB');
  if(t === 'A') {
    a.style.border = '2px solid var(--orange)'; a.style.background = 'var(--orange-l)';
    b.style.border = '2px solid var(--border)'; b.style.background = 'var(--gray-100)';
  } else {
    b.style.border = '2px solid var(--orange)'; b.style.background = 'var(--orange-l)';
    a.style.border = '2px solid var(--border)'; a.style.background = 'var(--gray-100)';
  }
  updatePreview();
}

// ============ PRINT ============
function doPrint() {
  var html = buildStickerHTML(true);
  document.getElementById('stickerPrint').innerHTML = html;
  document.body.className = 'print-real type-' + currentType;
  setTimeout(function(){
    window.print();
    setTimeout(function(){ document.body.className = ''; }, 500);
  }, 100);
}

function doPrintA4Test() {
  var html = buildStickerHTML(true);
  document.getElementById('stickerPrint').innerHTML = html;
  document.body.className = 'print-a4test type-' + currentType;
  setTimeout(function(){
    window.print();
    setTimeout(function(){ document.body.className = ''; }, 500);
  }, 100);
}
